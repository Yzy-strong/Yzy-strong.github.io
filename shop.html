    <main class="page">

            <button class="imgBtn" type="button" id="openEventModal" aria-label="限时活动">
              <span class="imgBtnMedia" aria-hidden="true">
                <svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="a1" x1="1" y1="0" x2="0" y2="1">
                      <stop offset="0" stop-color="#FF4D8D" stop-opacity="0.80"/>
                      <stop offset="0.5" stop-color="#7C4DFF" stop-opacity="0.80"/>
                      <stop offset="1" stop-color="#28D7FF" stop-opacity="0.72"/>
                    </linearGradient>
                  </defs>
                  <rect width="800" height="320" fill="rgba(0,0,0,.10)"/>

                  <circle cx="640" cy="120" r="170" fill="url(#a1)" opacity="0.18"/>
                  <rect x="40" y="40" width="720" height="240" rx="24" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)" stroke-width="2"/>

          <div class="imgButtonRow" aria-label="图片式信息入口">

                    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0" stop-color="#28D7FF" stop-opacity="0.90"/>
                      <stop offset="1" stop-color="#7C4DFF" stop-opacity="0.85"/>
                    </linearGradient>

                  <rect width="800" height="320" fill="rgba(0,0,0,.10)"/>
                  <circle cx="220" cy="120" r="120" fill="url(#c1)" opacity="0.28"/>

                  <rect x="40" y="40" width="720" height="240" rx="24" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
                  <text x="90" y="155" fill="rgba(255,255,255,.95)" font-size="56" font-weight="900" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial">联系客服</text>
                  <text x="92" y="215" fill="rgba(255,255,255,.72)" font-size="22" font-weight="800" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial">微信二维码入口</text>
                </svg>

            <button class="imgBtn" type="button" id="openOrderModal" aria-label="点单须知">

                  <defs>
                    <linearGradient id="d1" x1="1" y1="0" x2="0" y2="1">
                      <stop offset="0" stop-color="#FF4D8D" stop-opacity="0.80"/>
                      <stop offset="1" stop-color="#28D7FF" stop-opacity="0.70"/>
                    </linearGradient>
                  </defs>
                  <rect width="800" height="320" fill="rgba(0,0,0,.10)"/>
                  <circle cx="260" cy="240" r="140" fill="url(#d1)" opacity="0.22"/>
                  <circle cx="640" cy="120" r="170" fill="url(#d1)" opacity="0.18"/>
                  <rect x="40" y="40" width="720" height="240" rx="24" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
                  <text x="90" y="155" fill="rgba(255,255,255,.95)" font-size="56" font-weight="900" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial">点单须知</text>
                  <text x="92" y="215" fill="rgba(255,255,255,.72)" font-size="22" font-weight="800" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial">流程与注意事项</text>
                </svg>

    </main>

    <!-- 随时开战弹窗（包含三张图片） -->
    <div class="modalOverlay" id="battleModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="battleModalTitle">
        <div class="modalHeader">
          <h2 class="modalTitle" id="battleModalTitle">随时开战 · 套餐展示</h2>
          <button class="modalClose" type="button" id="closeBattleModal" aria-label="关闭">
            ✕
          </button>
        </div>
        <div class="modalBody">
          <div class="modalImages">
            <img src="image\jike\jike1.jpg" alt="随时开战图片一" class="zoomableImage" />
            <img src="image\jike\jike2.jpg" alt="随时开战图片二" class="zoomableImage" />
            <img src="image\jike\jike3.jpg" alt="随时开战图片三" class="zoomableImage" />
          </div>
        </div>
      </div>
    </div>

    <!-- 限时活动弹窗（包含两张竖图） -->
    <div class="modalOverlay" id="eventModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="eventModalTitle">
        <div class="modalHeader">
          <h2 class="modalTitle" id="eventModalTitle">限时活动 · 套餐展示</h2>
          <button class="modalClose" type="button" id="closeEventModal" aria-label="关闭">
            ✕
          </button>
        </div>
        <div class="modalBody">
          <div class="modalImages">
            <img src="image\huodong\huodong1.png" alt="限时活动图片一" class="zoomableImage" />
            <img src="image\huodong\huodong2.jpg" alt="限时活动图片二" class="zoomableImage" />

        </div>

    <!-- 联系客服弹窗（微信号可复制 + 抖音二维码） -->
    <div class="modalOverlay" id="contactModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
        <div class="modalHeader">
          <h2 class="modalTitle" id="contactModalTitle">联系客服（微信）</h2>
          <button class="modalClose" type="button" id="closeContactModal" aria-label="关闭">
            ✕
          </button>
        </div>
        <div class="modalBody">
          <div class="contactList">
            <div class="contactRow">
              <span class="contactLabel">AompleACE859</span>
              <code class="contactValue" id="wx1">AompleACE859</code>
              <button type="button" class="copyBtn" data-copy-target="wx1">复制</button>
            </div>
            <div class="contactRow">
              <span class="contactLabel">hujiahang977611</span>
              <code class="contactValue" id="wx2">hujiahang977611</code>
              <button type="button" class="copyBtn" data-copy-target="wx2">复制</button>
            </div>
            <div class="contactRow">
              <span class="contactLabel">liujinqi201327625</span>
              <code class="contactValue" id="wx3">liujinqi201327625</code>
              <button type="button" class="copyBtn" data-copy-target="wx3">复制</button>
            </div>
          </div>
          <div class="douyinWrap">
            <p class="modalNote">抖音二维码（占位）</p>
            <img src="image\douyin.jpg" alt="抖音二维码" class="douyinQr zoomableImage" />

    <!-- 点单须知弹窗（包含一张竖图） -->
    <div class="modalOverlay" id="orderModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="orderModalTitle">
        <div class="modalHeader">
          <h2 class="modalTitle" id="orderModalTitle">点单须知</h2>
          <button class="modalClose" type="button" id="closeOrderModal" aria-label="关闭">
            ✕
          </button>
        </div>
        <div class="modalBody">
          <div class="modalImages">
            <img src="image\diandanxuzhi.jpg" alt="点单须知竖图" class="zoomableImage" />
          </div>
        </div>
      </div>
    </div>

    <!-- 图片放大弹窗 -->
    <div class="zoomOverlay" id="zoomOverlay" aria-hidden="true">
      <button class="zoomClose" type="button" id="zoomClose" aria-label="关闭放大图">✕</button>
      <img id="zoomImage" src="" alt="放大预览图" />
    </div>

    <script>
      (function () {
        function bindModal(triggerId, modalId, closeId) {
          var trigger = document.getElementById(triggerId);
          var modal = document.getElementById(modalId);
          var closeBtn = document.getElementById(closeId);
          if (!trigger || !modal || !closeBtn) return;

          function openModal() {
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
          }

          function closeModal() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
          }

          trigger.addEventListener('click', openModal);
          closeBtn.addEventListener('click', closeModal);
          modal.addEventListener('click', function (e) {
            if (e.target === modal) closeModal();
          });

          document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeModal();
          });
        }

        bindModal('openBattleModal', 'battleModal', 'closeBattleModal');
        bindModal('openEventModal', 'eventModal', 'closeEventModal');
        bindModal('openContactModal', 'contactModal', 'closeContactModal');
        bindModal('openOrderModal', 'orderModal', 'closeOrderModal');

        function fallbackCopy(text) {
          var input = document.createElement('textarea');
          input.value = text;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          document.body.removeChild(input);
        }

        document.querySelectorAll('.copyBtn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var targetId = btn.getAttribute('data-copy-target');
            var target = targetId ? document.getElementById(targetId) : null;
            if (!target) return;
            var value = target.textContent ? target.textContent.trim() : '';
            if (!value) return;

            var done = function () {
              var old = btn.textContent;
              btn.textContent = '已复制';
              setTimeout(function () { btn.textContent = old; }, 1200);
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(value).then(done).catch(function () {
                fallbackCopy(value);
                done();
              });
            } else {
              fallbackCopy(value);
              done();
            }
          });
        });

        var zoomOverlay = document.getElementById('zoomOverlay');
        var zoomImage = document.getElementById('zoomImage');
        var zoomClose = document.getElementById('zoomClose');

        function closeZoom() {
          if (!zoomOverlay || !zoomImage) return;
          zoomOverlay.classList.remove('is-open');
          zoomOverlay.setAttribute('aria-hidden', 'true');
          zoomImage.src = '';
        }

        document.querySelectorAll('.zoomableImage').forEach(function (img) {
          img.addEventListener('click', function () {
            if (!zoomOverlay || !zoomImage) return;
            zoomImage.src = img.src;
            zoomImage.alt = img.alt || '放大预览图';
            zoomOverlay.classList.add('is-open');
            zoomOverlay.setAttribute('aria-hidden', 'false');
          });
        });

        if (zoomClose) zoomClose.addEventListener('click', closeZoom);
        if (zoomOverlay) {
          zoomOverlay.addEventListener('click', function (e) {
            if (e.target === zoomOverlay) closeZoom();
          });
        }

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') closeZoom();
        });
      })();
    </script>
  </body>
</html>
